
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전문 출장 용접 & 커스텀 제작</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { height: 100%; overflow: hidden; } /* 스크롤 방지 */
    </style>
</head>
<body class="bg-slate-900 text-white flex flex-col h-screen">

    <!-- Header: 핵심 문구 -->
    <header class="flex-none pt-10 pb-6 text-center px-4">
        <h1 class="text-3xl md:text-5xl font-extrabold text-orange-500 mb-2">
            작은 용접, 정밀한 수리
        </h1>
        <p class="text-lg md:text-xl text-gray-300">
            KL-170S의 기동성으로 대형 업체가 꺼리는 일도 완벽하게 해결합니다.
        </p>
    </header>

    <!-- Main Content: 3가지 핵심 서비스 -->
    <main class="flex-grow flex items-center px-4">
        <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 w-full">

            <!-- 서비스 1 -->
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-center shadow-xl">
                <i class="fas fa-truck-moving text-3xl text-orange-400 mb-3"></i>
                <h3 class="text-xl font-bold mb-2">출장 보수</h3>
                <p class="text-gray-400 text-sm">대문, 난간, 상가 집기 등<br>현장에서 바로 수리</p>
            </div>

            <!-- 서비스 2 -->
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-center shadow-xl">
                <i class="fas fa-hammer text-3xl text-blue-400 mb-3"></i>
                <h3 class="text-xl font-bold mb-2">커스텀 제작</h3>
                <p class="text-gray-400 text-sm">캠핑용품, 철제 다리 등<br>원하는 사이즈 맞춤 제작</p>
            </div>

            <!-- 서비스 3 -->
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-center shadow-xl">
                <i class="fas fa-magic text-3xl text-green-400 mb-3"></i>
                <h3 class="text-xl font-bold mb-2">업사이클링</h3>
                <p class="text-gray-400 text-sm">낡은 가구 및 고철 활용<br>빈티지 소품으로 재탄생</p>
            </div>

        </div>
    </main>

    <!-- Footer: 연락처 및 마무리 -->
    <footer class="flex-none pb-10 pt-6 text-center px-4">
        <div class="bg-orange-500 text-slate-900 d-inline-block px-8 py-4 rounded-2xl shadow-2xl inline-block">
            <p class="text-sm font-bold uppercase tracking-widest mb-1">상담 및 견적 문의</p>
            <p class="text-2xl md:text-3xl font-black">010-XXXX-XXXX</p>
        </div>
        <p class="mt-4 text-gray-500 text-xs tracking-tighter">
            서울 강동 및 인근 지역 출장 가능 | 주말·공휴일 상담 환영
        </p>
    </footer>

</body>
</html>
